<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Feltshift</title>
<style>
:root {
  --bg-deep: #050705;
  --text-primary: #E0DBCC;
  --text-secondary: #AAA598;
  --text-muted: #6E695E;
  --green: #7EA066;
  --amber: #BF9B55;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.container { max-width: 500px; }
h1 {
  font-family: 'Georgia', serif;
  font-size: clamp(4rem, 15vw, 8rem);
  font-weight: 300;
  color: var(--amber);
  margin-bottom: 0.5rem;
  letter-spacing: 0.1em;
}
h2 {
  font-family: 'Georgia', serif;
  font-weight: 300;
  font-size: 1.5rem;
  margin-bottom: 1.5rem;
}
p {
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 2rem;
}
a {
  color: var(--green);
  text-decoration: none;
  border-bottom: 1px solid var(--green);
  transition: all 0.3s;
}
a:hover {
  color: var(--amber);
  border-bottom-color: var(--amber);
}
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 1.5rem 2rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav-logo {
  font-family: 'Georgia', serif;
  font-size: 1.2rem;
  letter-spacing: 0.12em;
  color: var(--text-primary);
  text-decoration: none;
}
.nav-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 0.75rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-left: 1.5rem;
  transition: color 0.3s;
}
.nav-links a:hover { color: var(--green); }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-logo">FELTSHIFT</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/app">Open App</a>
  </div>
</nav>

<div class="container">
  <h1>404</h1>
  <h2>This path isn't mapped yet.</h2>
  <p>The page you're looking for doesn't exist or has moved.<br>Sometimes we need to find our way back.</p>
  <a href="/">Return Home</a> · <a href="/app">Open the App</a>
</div>
</body>
</html>
